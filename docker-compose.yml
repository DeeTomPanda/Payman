services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payman
      POSTGRES_PASSWORD: payman
      POSTGRES_DB: payman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U payman -d payman -c 'SELECT 1;'"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://payman:payman@postgres:5432/payman
      - REDIS_URL=redis://default:payman@redis:6379
      - MOCK_PSP_URL=http://mock-psp:9090
    depends_on:
      postgres:
        condition: service_healthy
      mock-psp:
        condition: service_healthy
    command: ["./Payman"]

  mock-psp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PSP_PORT=9090
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9090/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: ["./psp"]
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  redis_data:
